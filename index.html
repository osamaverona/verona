<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيادات ڤيرونا | نظام الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0c1829;--navy2:#162236;--teal:#0d9488;--teal2:#14b8a6;--bg:#f1f5f9;--white:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--success:#16a34a;--danger:#dc2626;--warning:#d97706}
body{font-family:'Cairo',sans-serif;direction:rtl;background:var(--bg);color:var(--text)}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--navy);min-height:100vh;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;overflow-y:auto}
.main{flex:1;overflow-x:hidden}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo h1{color:#fff;font-size:13.5px;font-weight:800}
.sb-logo p{color:var(--teal2);font-size:10.5px;margin-top:2px;font-weight:500}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:none;background:none;color:rgba(255,255,255,.45);font-size:12px;font-weight:600;cursor:pointer;width:100%;text-align:right;font-family:'Cairo',sans-serif;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.nav-btn.active{background:var(--teal);color:#fff}
.nav-btn .nav-label{flex:1}
.sb-footer{padding:12px 14px;border-top:1px solid rgba(255,255,255,.07)}
.sb-user{color:rgba(255,255,255,.5);font-size:10.5px;margin-bottom:7px;line-height:1.6}
.sb-user strong{display:block;color:rgba(255,255,255,.85);font-size:12px;font-weight:700}
.page-hdr{background:#fff;padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.page-hdr h2{font-size:16px;font-weight:800}
.page-hdr p{font-size:11px;color:var(--muted);margin-top:2px}
.page-body{padding:18px 22px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.card{background:#fff;border-radius:11px;padding:14px 16px;border:1px solid var(--border);border-right:3px solid var(--teal)}
.card .lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.card .val{font-size:20px;font-weight:900;color:var(--text);margin:4px 0 2px;line-height:1.2}
.card .sub{font-size:10px;color:var(--muted)}
.tbl-wrap{background:#fff;border-radius:11px;border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
.tbl-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.tbl-hdr h3{font-size:13px;font-weight:700}
table{width:100%;border-collapse:collapse}
th{background:#f8fafc;padding:8px 12px;text-align:right;font-size:10px;font-weight:700;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:9px 12px;font-size:12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;font-size:11.5px;font-weight:700;cursor:pointer;border:none;font-family:'Cairo',sans-serif;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--teal);color:#fff}.btn-primary:hover{background:var(--teal2)}
.btn-outline{background:#fff;color:var(--text);border:1.5px solid var(--border)}.btn-outline:hover{background:var(--bg)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-sm{padding:4px 9px;font-size:10.5px}
.btn-ghost{background:none;color:var(--muted);border:none;cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px}.btn-ghost:hover{color:var(--text)}
.badge{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.bg{background:#dcfce7;color:#15803d}.br{background:#fee2e2;color:#b91c1c}
.by{background:#fef9c3;color:#a16207}.bb{background:#dbeafe;color:#1d4ed8}
.bgr{background:#f1f5f9;color:#475569}.bt{background:#ccfbf1;color:#0f766e}.bo{background:#ffedd5;color:#c2410c}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11.5px;font-weight:700;color:var(--text);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12.5px;font-family:'Cairo',sans-serif;color:var(--text);outline:none;transition:border .15s;background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--teal)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;padding-top:11px;border-top:1px solid var(--border)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:#fff;border-radius:16px;padding:22px;width:540px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.25)}
.modal-ttl{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-ttl h3{font-size:15px;font-weight:800}
.alert{padding:9px 13px;border-radius:8px;margin-bottom:12px;font-size:12px;display:flex;align-items:flex-start;gap:8px;font-weight:500}
.a-warn{background:#fffbeb;border:1px solid #fcd34d;color:#78350f}
.a-ok{background:#f0fdf4;border:1px solid #86efac;color:#14532d}
.a-err{background:#fef2f2;border:1px solid #fca5a5;color:#7f1d1d}
.a-info{background:#eff6ff;border:1px solid #93c5fd;color:#1e3a8a}
.auth-pg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy) 0%,#0f2d4a 100%)}
.auth-box{background:#fff;border-radius:20px;padding:32px;width:390px;max-width:95vw}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo h1{font-size:19px;font-weight:900;color:var(--navy)}
.auth-logo p{font-size:12px;color:var(--muted);margin-top:3px}
.auth-divider{text-align:center;margin:14px 0;font-size:11px;color:var(--muted)}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);font-size:13px;gap:10px}
.spin{width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:sp .65s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.rt-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:rtpulse 2s infinite;display:inline-block}
@keyframes rtpulse{0%,100%{opacity:1}50%{opacity:.3}}
.rt-label{font-size:10.5px;color:var(--success);font-weight:700;display:inline-flex;align-items:center;gap:4px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.info-section{background:#fff;border-radius:11px;border:1px solid var(--border);padding:16px}
.info-section h4{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:11px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:12px}
.info-row:last-child{border-bottom:none}
.info-row .k{color:var(--muted)}.info-row .v{font-weight:700;text-align:left;direction:ltr}
.file-drop{border:2px dashed var(--border);border-radius:9px;padding:16px;text-align:center;cursor:pointer;color:var(--muted);font-size:12px;transition:all .15s}
.file-drop:hover{border-color:var(--teal);color:var(--teal);background:#f0fdfa}
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:7px;margin-top:10px}
.file-item{border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;position:relative}
.file-item img{width:100%;height:68px;object-fit:cover;display:block}
.file-item .fn{padding:3px 6px;font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-cat-badge{position:absolute;top:3px;right:3px;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:800;background:rgba(0,0,0,.6);color:#fff}
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.rc{background:#fff;border-radius:13px;border:1px solid var(--border);padding:20px}
.rc h3{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.big-n{font-size:30px;font-weight:900;color:var(--teal);line-height:1}
.big-l{font-size:10.5px;color:var(--muted);margin-top:4px}
.formula{background:#f8fafc;border-radius:7px;padding:8px 11px;font-size:10.5px;color:var(--muted);margin-top:11px;font-family:monospace;direction:ltr;line-height:1.6}
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:12px}
.metric-row:last-child{border-bottom:none}
.tabs{display:flex;gap:3px;margin-bottom:14px;background:#fff;border:1px solid var(--border);border-radius:9px;padding:3px;width:fit-content}
.tab{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:none;font-family:'Cairo',sans-serif;color:var(--muted);transition:all .15s}
.tab.active{background:var(--teal);color:#fff}
.tooth-chart{background:#fff;border-radius:11px;border:1px solid var(--border);padding:16px;margin-bottom:16px}
.tooth-chart h4{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.teeth-grid{display:flex;flex-direction:column;gap:5px;align-items:center}
.teeth-row{display:flex;gap:2px;justify-content:center;align-items:center}
.teeth-divider{width:1px;height:26px;background:var(--border);margin:0 6px}
.tooth-btn{width:30px;height:34px;border-radius:6px;border:2px solid var(--border);background:#f8fafc;font-size:8.5px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:all .15s;font-family:'Cairo',sans-serif}
.tooth-btn:hover{border-color:var(--teal);transform:scale(1.08)}
.tooth-btn.treated{border-color:var(--teal);background:#0d9488;color:#fff}
.tooth-btn.crown_needed{border-color:#f59e0b;background:#f59e0b;color:#fff}
.tooth-btn.needs{border-color:var(--warning);background:#f59e0b;color:#fff}
.tooth-btn.extracted{border-color:var(--danger);background:#dc2626;color:#fff}
.tooth-btn.implant{border-color:#8b5cf6;background:#8b5cf6;color:#fff}
.tooth-btn.planned{border-color:#0ea5e9;background:#0ea5e9;color:#fff}
.chart-legend{display:flex;gap:9px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.legend-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--muted)}
.legend-dot{width:11px;height:11px;border-radius:3px;border:2px solid}
.pt-num{display:inline-flex;padding:1px 6px;border-radius:5px;background:var(--navy);color:#fff;font-size:10px;font-weight:800;letter-spacing:.5px}
.pagination{display:flex;align-items:center;gap:5px;justify-content:center;padding:14px}
.pg-btn{padding:5px 11px;border-radius:7px;border:1.5px solid var(--border);background:#fff;font-size:11.5px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;transition:all .15s}
.pg-btn:hover{background:var(--bg)}.pg-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-info{font-size:11.5px;color:var(--muted);font-weight:600}
.search-bar{flex:1;padding:8px 13px;border:1.5px solid var(--border);border-radius:9px;font-family:'Cairo',sans-serif;font-size:12.5px;outline:none;transition:border .15s}
.search-bar:focus{border-color:var(--teal)}
.treatment-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;background:#fff}
.treatment-item.done{background:#f0fdf4;border-color:#86efac}
.treatment-item.inprogress{background:#eff6ff;border-color:#93c5fd}
.treatment-item.pending{background:#f8fafc}
.rx-section{background:#fff;border:1px solid var(--border);border-radius:11px;padding:16px;margin-bottom:16px}
.debt-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #f1f5f9;font-size:12.5px;cursor:pointer}
.debt-row:hover{background:#f8fafc}
.debt-row:last-child{border-bottom:none}
/* Photo categories */
.photo-tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.photo-tab{padding:4px 10px;border-radius:6px;font-size:10.5px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:#fff;font-family:'Cairo',sans-serif;transition:all .15s}
.photo-tab.active{background:var(--teal);color:#fff;border-color:var(--teal)}
/* Mobile */
@media(max-width:768px){.sidebar{display:none}.form-row{grid-template-columns:1fr}.detail-grid,.report-grid{grid-template-columns:1fr}.cards{grid-template-columns:repeat(2,1fr)}.main{padding-bottom:75px}}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:1px solid rgba(255,255,255,.12);z-index:9999;padding:5px 0 12px}
@media(max-width:768px){.mobile-nav{display:flex}}
.mobile-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;color:rgba(255,255,255,.4);cursor:pointer;font-family:'Cairo',sans-serif;font-size:8.5px;font-weight:600;padding:4px 2px;-webkit-tap-highlight-color:transparent}
.mobile-nav-btn.active{color:var(--teal2)}
.mobile-nav-btn svg{width:19px;height:19px}
@media print{.sidebar,.page-hdr,.btn,.mobile-nav{display:none!important}.main{padding:0}.page-body{padding:8px}}
</style>
</head>
<body>
<div id="pg-setup" style="display:none">
  <div class="auth-pg">
    <div class="auth-box">
      <div class="auth-logo"><div style="font-size:34px;margin-bottom:7px">🦷</div><h1>إعداد النظام</h1><p>أدخل بيانات Supabase</p></div>
      <div class="alert a-info"><span>ℹ️</span><span>supabase.com ← Project Settings ← API</span></div>
      <div class="form-group"><label>Project URL</label><input id="sb-url" placeholder="https://xxx.supabase.co" dir="ltr"></div>
      <div class="form-group"><label>anon public Key</label><input id="sb-key" placeholder="eyJ..." dir="ltr"></div>
      <div id="setup-err" class="alert a-err" style="display:none"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px" onclick="saveSetup()">حفظ والمتابعة ←</button>
    </div>
  </div>
</div>
<div id="pg-login" style="display:none">
  <div class="auth-pg">
    <div class="auth-box">
      <div class="auth-logo"><div style="font-size:34px;margin-bottom:7px">🦷</div><h1>عيادات ڤيرونا</h1><p>نظام الإدارة — كركوك</p></div>
      <div class="form-group"><label>البريد الإلكتروني</label><input id="l-email" type="email" dir="ltr"></div>
      <div class="form-group"><label>كلمة المرور</label><input id="l-pass" type="password" dir="ltr" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div id="login-err" class="alert a-err" style="display:none"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px" onclick="doLogin()">دخول</button>
      <div class="auth-divider">──────────</div>
      <button class="btn-ghost" style="width:100%;text-align:center" onclick="showSetup()">تغيير إعدادات Supabase</button>
    </div>
  </div>
</div>
<div id="pg-app" style="display:none">
  <div class="app">
    <aside class="sidebar">
      <div class="sb-logo"><h1>🦷 عيادات ڤيرونا</h1><p>نظام الإدارة المتكامل</p></div>
      <nav class="sb-nav" id="sidebar-nav"></nav>
      <div class="sb-footer">
        <div class="sb-user"><strong id="u-name">—</strong><span id="u-role"></span></div>
        <button class="btn btn-outline btn-sm" style="width:100%;justify-content:center" onclick="doLogout()">خروج</button>
      </div>
    </aside>
    <main class="main">
      <div class="page-hdr">
        <div><h2 id="pg-title">—</h2><p id="pg-sub">—</p></div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="rt-label"><span class="rt-dot"></span>متصل</div>
        </div>
      </div>
      <div class="page-body" id="pg-content"><div class="loading"><div class="spin"></div>تحميل...</div></div>
    </main>
  </div>
</div>

<script>
'use strict';
const CFG='verona_cfg_v2';
let sb=null,USER=null,ROLE='reception',RT=null,CUR='dashboard';
let PT_PAGE=1,PT_SEARCH='',PT_FILTER='all',RPT_MONTH=todayStr().slice(0,7);
const PT_PER=50;

const getConf=()=>{try{return JSON.parse(localStorage.getItem(CFG));}catch{return null;}};
const saveConf=(u,k)=>localStorage.setItem(CFG,JSON.stringify({url:u,key:k}));
function initSB(){const c=getConf();if(!c?.url||!c?.key)return false;try{sb=window.supabase.createClient(c.url,c.key);return true;}catch{return false;}}
function todayStr(){return new Date().toISOString().slice(0,10)}
function tomorrowStr(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10)}
const fmt=n=>(Number(n)||0).toLocaleString('ar-IQ')+' د.ع';
const fmtD=d=>d?new Date(d).toLocaleDateString('ar-IQ'):'—';
const v=id=>document.getElementById(id)?.value||'';
const esc=s=>String(s||'').replace(/['"<>&]/g,c=>({'\'':'&#39;','"':'&quot;','<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
const icon=(d,s=15)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${d}"/></svg>`;

const NAV={
  admin:[
    {k:'dashboard',l:'لوحة التحكم',d:'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z M9 22V12h6v10'},
    {k:'patients', l:'المرضى',d:'M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2 M9 11a4 4 0 100-8 4 4 0 000 8'},
    {k:'appts',    l:'المواعيد',d:'M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z'},
    {k:'payments', l:'المدفوعات',d:'M12 1v22M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6'},
    {k:'debts',    l:'الديون',d:'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z'},
    {k:'expenses', l:'المصاريف',d:'M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z'},
    {k:'doctors',  l:'إحصائيات الأطباء',d:'M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2 M23 21v-2a4 4 0 00-3-3.87 M16 3.13a4 4 0 010 7.75'},
    {k:'reports',  l:'التقارير',d:'M18 20V10M12 20V4M6 20v-6'},
  ],
  doctor:[
    {k:'patients', l:'المرضى',d:'M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2 M9 11a4 4 0 100-8 4 4 0 000 8'},
    {k:'appts',    l:'المواعيد',d:'M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z'},
    {k:'payments', l:'تسجيل دفعة',d:'M12 1v22M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6'},
  ],

async function init(){
  ['pg-setup','pg-login','pg-app'].forEach(id=>show(id,false));
  if(!initSB()){showSetup();return;}
  const{data:{session}}=await sb.auth.getSession();
  if(!session){showLogin();return;}
  USER=session.user;ROLE=USER.user_metadata?.role||'reception';
  showApp();
}
function show(id,v=true){const el=document.getElementById(id);if(el)el.style.display=v?'block':'none';}
function showSetup(){show('pg-setup');show('pg-login',false);show('pg-app',false);}
function showLogin(){show('pg-setup',false);show('pg-login');show('pg-app',false);}
function showApp(){show('pg-setup',false);show('pg-login',false);show('pg-app');buildApp();}
function errMsg(id,msg){const el=document.getElementById(id);if(!el)return;el.textContent=msg;el.style.display='flex';setTimeout(()=>el.style.display='none',4000);}

async function saveSetup(){
  const url=v('sb-url').trim(),key=v('sb-key').trim();
  if(!url||!key){errMsg('setup-err','أدخل URL و Key');return;}
  saveConf(url,key);if(!initSB()){errMsg('setup-err','بيانات غير صحيحة');return;}
  showLogin();
}
async function doLogin(){
  const email=v('l-email').trim(),pass=v('l-pass');
  if(!email||!pass){errMsg('login-err','أدخل البريد وكلمة المرور');return;}
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){errMsg('login-err','بيانات خاطئة');return;}
  USER=data.user;ROLE=USER.user_metadata?.role||'reception';showApp();
}
async function doLogout(){await sb.auth.signOut();USER=null;showLogin();}

function buildApp(){
  document.getElementById('u-name').textContent=USER.user_metadata?.name||USER.email;
  document.getElementById('u-role').textContent={admin:'(مدير)',doctor:'(طبيب)',reception:'(استقبال)'}[ROLE]||'';
  const items=NAV[ROLE]||NAV.reception;
  document.getElementById('sidebar-nav').innerHTML=items.map(p=>
    `<button class="nav-btn" id="nav-${p.k}" onclick="nav('${p.k}')">${icon(p.d,15)}<span class="nav-label">${p.l}</span></button>`
  ).join('');
  const mn=document.getElementById('mobile-nav');
  mn.innerHTML=items.map(p=>
    `<button class="mobile-nav-btn" id="mnav-${p.k}" onclick="nav('${p.k}')">${icon(p.d,19)}<span>${p.l.split(' ')[0]}</span></button>`
  ).join('');
  nav(items[0].k);setupRT();
}

function nav(page){
  CUR=page;
  document.querySelectorAll('.nav-btn,.mobile-nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+page)?.classList.add('active');
  document.getElementById('mnav-'+page)?.classList.add('active');
  const[t,s]=TITLES[page]||[page,''];
  document.getElementById('pg-title').textContent=t;
  document.getElementById('pg-sub').textContent=s;
  renderPage(page);
}
async function renderPage(page){
  document.getElementById('pg-content').innerHTML='<div class="loading"><div class="spin"></div>تحميل...</div>';
  const fn={dashboard:renderDash,patients:renderPatients,appts:renderAppts,payments:renderPayments,debts:renderDebts,expenses:renderExpenses,doctors:renderDoctors,reports:renderReports};
  await(fn[page]||renderDash)();
}
function setupRT(){
  if(RT)sb.removeChannel(RT);
  RT=sb.channel('vrt')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'payments'},(payload)=>{
      if(['payments','dashboard','debts'].includes(CUR))renderPage(CUR);
      // إشعار للاستقبال عند تسجيل دفعة جديدة
      if(ROLE==='reception'){
        const p=payload.new;
        showNotification(`💰 دفعة جديدة — ${p.patient_name||'مريض'} — ${(p.paid_amount||0).toLocaleString('ar-IQ')} د.ع — ${p.doctor_name||'—'}`);
      }
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'payments'},()=>{if(['payments','dashboard','debts'].includes(CUR))renderPage(CUR);})
    .on('postgres_changes',{event:'*',schema:'public',table:'appointments'},()=>{if(['appts','dashboard'].includes(CUR))renderPage(CUR);})
    .subscribe();
}

function showNotification(msg){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#0d9488;color:#fff;padding:12px 22px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.3);font-family:Cairo,sans-serif;direction:rtl;animation:slideDown .3s ease';
  el.textContent=msg;
  document.body.appendChild(el);
  // صوت تنبيه
  try{const ctx=new AudioContext();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);o.start();o.stop(ctx.currentTime+0.4);}catch(e){}
  setTimeout(()=>el.remove(),4000);
}
function nr(c=4,m='لا توجد بيانات'){return `<tr><td colspan="${c}" style="text-align:center;color:var(--muted);padding:26px;font-size:12px">${m}</td></tr>`}

async function renderPatients(){

  if(PT_FILTER==='refused')q=q.eq('refused_treatment',true);
  else if(PT_FILTER==='followup')q=q.not('followup_date','is',null);
  const from=(PT_PAGE-1)*PT_PER,to=from+PT_PER-1;

  const{data:pts,count}=await q;
  const totalPages=Math.ceil((count||0)/PT_PER);
  document.getElementById('pg-content').innerHTML=`

    </div>

      <div class="tbl-hdr"><h3>المرضى — ${count||0}</h3><span class="pg-info">صفحة ${PT_PAGE} / ${totalPages||1}</span></div>
      <table><thead><tr><th>الرقم</th><th>الاسم</th><th>الهاتف</th><th>المصدر</th><th>المتابعة</th><th>الحالة</th><th></th></tr></thead>
      <tbody>${(pts||[]).map(p=>`<tr onclick="openPatient('${p.id}')">
        <td><span class="pt-num">${esc(p.patient_number||'—')}</span></td>
        <td style="font-weight:800">${esc(p.name)}</td>
        <td dir="ltr">${ROLE==='doctor'?'<span style="color:var(--border)">••••••••••</span>':esc(p.phone||'—')}</td>
        <td>${p.source_page?`<span class="badge bt">${esc(p.source_page)}</span>`:p.acquisition_source?`<span class="badge bgr">${esc(p.acquisition_source)}</span>`:'—'}</td>
        <td>${p.followup_date?`<span style="color:var(--warning);font-weight:700;font-size:11px">📅 ${p.followup_date}</span>`:'—'}</td>
        <td>${p.refused_treatment?'<span class="badge br">رفض</span>':'<span class="badge bg">نشط</span>'}</td>
        <td><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openPatient('${p.id}')">فتح ←</button></td>
      </tr>`).join('')||nr(7)}</tbody></table>
      ${totalPages>1?`<div class="pagination">
        <button class="pg-btn" onclick="PT_PAGE=1;renderPatients()" ${PT_PAGE===1?'disabled':''}>«</button>
        <button class="pg-btn" onclick="PT_PAGE--;renderPatients()" ${PT_PAGE<=1?'disabled':''}>‹</button>

// ── Treatment Plans ───────────────────────────────────
function modalAddPlan(pid,pname){
  modal(`خطة علاج — ${pname}`,`
    <div class="form-group"><label>عنوان الخطة</label><input id="pl-title" placeholder="مثال: خطة تقويم شاملة"></div>
    <div id="pl-items" style="margin-bottom:12px"></div>
    <button class="btn btn-outline btn-sm" onclick="addPlanItem()" style="width:100%;justify-content:center">+ إضافة خدمة</button>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" onclick="savePlan('${pid}')">حفظ الخطة</button>
    </div>`);
  addPlanItem();
}

let planItems=[];
function addPlanItem(){
  planItems=planItems||[];
  const idx=Date.now();
  const svcs=['حشو','تلبيس','علاج عصب','خلع','زراعة','تقويم','تبييض','فينير','تنظيف','جسر'];
  const div=document.createElement('div');
  div.style.cssText='display:grid;grid-template-columns:1fr 60px 100px auto;gap:6px;margin-bottom:7px;align-items:center';
  div.innerHTML=`
    <select class="pl-svc" style="padding:7px 8px;border:1.5px solid var(--border);border-radius:7px;font-family:'Cairo',sans-serif;font-size:12px"><option value="">الخدمة</option>${svcs.map(s=>`<option>${s}</option>`).join('')}</select>
    <input class="pl-tooth" type="number" placeholder="سن" min="11" max="48" style="padding:7px 8px;border:1.5px solid var(--border);border-radius:7px;font-family:'Cairo',sans-serif;font-size:12px">
    <input class="pl-cost" type="number" placeholder="التكلفة" style="padding:7px 8px;border:1.5px solid var(--border);border-radius:7px;font-family:'Cairo',sans-serif;font-size:12px">
    <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('pl-items').appendChild(div);
}

async function savePlan(pid){
  const title=v('pl-title')||'خطة علاج';
  const rows=document.getElementById('pl-items').querySelectorAll('div');
  const items=[];
  rows.forEach(row=>{
    const svc=row.querySelector('.pl-svc')?.value;
    const tooth=row.querySelector('.pl-tooth')?.value;
    const cost=Number(row.querySelector('.pl-cost')?.value||0);
    if(svc)items.push({service:svc,tooth:tooth||null,cost,status:'pending'});
  });
  if(!items.length){alert('أضف خدمة واحدة على الأقل');return;}
  await sb.from('treatment_plans').insert({patient_id:pid,title,items});
  closeModal();openPatient(pid);
}

async function togglePlanItem(planId,patientId,idx,checked){
  const{data:pl}=await sb.from('treatment_plans').select('items').eq('id',planId).single();
  if(!pl)return;
  const items=[...(pl.items||[])];
  if(items[idx])items[idx].status=checked?'done':'pending';
  await sb.from('treatment_plans').update({items}).eq('id',planId);
  openPatient(patientId);
}

async function deletePlan(planId,patientId){
  if(!confirm('حذف خطة العلاج؟'))return;
  await sb.from('treatment_plans').delete().eq('id',planId);
  openPatient(patientId);
}

  win.document.close();

function updateWaMsg(type,pname){
  const msgs={
    appt:`السلام عليكم ${pname}،\nنذكركم بموعدكم في عيادات ڤيرونا غداً.\nنرجو الحضور في الوقت المحدد.\nشكراً 🦷`,
    followup:`السلام عليكم ${pname}،\nحرصاً على صحتكم، نرجو تحديد موعد للمتابعة مع طبيبكم في عيادات ڤيرونا.\nللحجز تواصلوا معنا 🦷`,
    payment:`السلام عليكم ${pname}،\nنذكركم بوجود مبلغ مستحق لعيادات ڤيرونا.\nنرجو التواصل لتسوية الحساب.\nشكراً 🦷`,
    custom:'',
  };
  const el=document.getElementById('wa-msg');
  if(el)el.value=msgs[type]||'';
}

function openWa(phone){
  const msg=v('wa-msg');
  const clean=phone.replace(/\D/g,'');
  const num=clean.startsWith('0')?'964'+clean.slice(1):clean;
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`,'_blank');
  closeModal();
}

async function uploadFile(pid,input){
  const file=input.files[0];if(!file)return;
  const cats=['xray','before','after','other'];
  const catLabels=['أشعة','قبل العلاج','بعد العلاج','أخرى'];
  const catIdx=cats.indexOf(prompt('نوع الملف:\n1. أشعة\n2. قبل العلاج\n3. بعد العلاج\n4. أخرى\nأدخل رقم:')==='1'?'xray':prompt==='2'?'before':prompt==='3'?'after':'other');
  const category=prompt('نوع الملف: xray / before / after / other')||'other';
  const desc=prompt('وصف الملف:')||file.name;
  const ext=file.name.split('.').pop();
  const path=`${pid}/${Date.now()}.${ext}`;
  const{error:ue}=await sb.storage.from('patient-files').upload(path,file);
  if(ue){alert('خطأ: '+ue.message);return;}
  const{data:{publicUrl}}=sb.storage.from('patient-files').getPublicUrl(path);
  await sb.from('patient_files').insert({patient_id:pid,file_url:publicUrl,file_name:file.name,file_type:file.type,description:desc,category});
  openPatient(pid);
}

function calcRem(){
  const t=Number(document.getElementById('pay-total')?.value||0),p=Number(document.getElementById('pay-paid')?.value||0),r=Math.max(0,t-p);
  const el=document.getElementById('pay-rem-info');
  if(el){el.textContent=`المتبقي: ${r.toLocaleString('ar-IQ')} د.ع`;el.className=`alert ${r>0?'a-warn':'a-ok'}`;}
}

async function savePay(fixId,fixName){
  let pid=fixId,pname=fixName;
  if(!pid){const pv=v('pay-p');if(!pv){alert('اختر مريضاً');return;}[pid,pname]=pv.split('|');}
  const total=Number(v('pay-total')||0),paid=Number(v('pay-paid')||0),remaining=Math.max(0,total-paid);
  const service=v('pay-s').trim();if(!service){alert('أدخل الخدمة');return;}
  // اسم الطبيب — من حقل النموذج أو من بيانات المستخدم الحالي

async function saveCollectRemaining(payId,patientId,oldRemaining){
  const collected=Number(v('cr-amount')||0);
  if(!collected||collected<=0){alert('أدخل المبلغ');return;}
  const{data:pay}=await sb.from('payments').select('paid_amount,remaining').eq('id',payId).single();
  if(!pay)return;
  const newPaid=(pay.paid_amount||0)+collected;
  const newRemaining=Math.max(0,(pay.remaining||0)-collected);
  await sb.from('payments').update({paid_amount:newPaid,remaining:newRemaining}).eq('id',payId);
  closeModal();openPatient(patientId);
}

function calcRemEdit(){
  const t=Number(document.getElementById('ep-total')?.value||0),p=Number(document.getElementById('ep-paid')?.value||0),r=Math.max(0,t-p);
  const el=document.getElementById('ep-rem-info');
  if(el){el.textContent=`المتبقي: ${r.toLocaleString('ar-IQ')} د.ع`;el.className=`alert ${r>0?'a-warn':'a-ok'}`;}
}

async function saveEditPayment(payId,patientId){
  const svc=v('ep-svc').trim();if(!svc){alert('أدخل الخدمة');return;}
  const total=Number(v('ep-total')||0),paid=Number(v('ep-paid')||0),remaining=Math.max(0,total-paid);
  await sb.from('payments').update({service:svc,total_amount:total,paid_amount:paid,remaining,date:v('ep-date'),doctor_name:v('ep-dr').trim(),notes:v('ep-note').trim()}).eq('id',payId);
  closeModal();if(patientId)openPatient(patientId);else renderPayments();
}

async function deletePayment(payId,patientId){
  if(!confirm('حذف هذه الدفعة؟'))return;
  await sb.from('payments').delete().eq('id',payId);
  if(patientId)openPatient(patientId);else renderPayments();
}

          <th>الجلسات</th>

              </div>
            </td>
            <td style="color:var(--teal);font-weight:800">${fmt(drShare)}</td>

    <div class="rc" style="margin-top:16px">
      <h3>المقارنة البيانية</h3>

        <div style="max-height:280px;overflow-y:auto">
          ${(moPays||[]).length>0?`<table style="width:100%;border-collapse:collapse">
            <thead><tr>${['المريض','الخدمة','المدفوع'].map(h=>`<th style="text-align:right;padding:5px 8px;font-size:10px;color:var(--muted);border-bottom:1px solid var(--border)">${h}</th>`).join('')}</tr></thead>
            <tbody>${(moPays||[]).map(p=>`<tr style="border-bottom:1px solid #f1f5f9"><td style="padding:5px 8px;font-size:11.5px;font-weight:600">${esc(p.patient_name||'—')}</td><td style="padding:5px 8px;font-size:10.5px;color:var(--muted)">${esc(p.service||'—')}</td><td style="padding:5px 8px;font-size:11.5px;color:var(--success);font-weight:700">${fmt(p.paid_amount)}</td></tr>`).join('')}</tbody>
          </table>`:`<div style="text-align:center;color:var(--muted);padding:18px;font-size:12px">لا مدفوعات</div>`}
        </div>
      </div>
      <div class="rc">
        <h3>🎯 CAC و LTV</h3>
        <div class="big-n">${fmt(cac)}</div><div class="big-l">تكلفة اكتساب مريض</div>
        <div class="formula">تسويق ÷ مرضى جدد<br>${fmt(mktMo)} ÷ ${newPts||0} = ${fmt(cac)}</div>
        <div class="metric-row" style="margin-top:12px"><span style="color:var(--muted);font-size:12px">LTV متوسط المريض</span><strong style="color:var(--teal)">${fmt(ltv)}</strong></div>
        <div class="metric-row"><span style="color:var(--muted);font-size:12px">نسبة LTV/CAC</span><strong style="color:${Number(ltvCac)>=3?'var(--success)':'var(--danger)'}">${ltvCac}x</strong></div>
      </div>
      <div class="rc">
        <h3>📈 الملخص الكلي</h3>
        <div class="metric-row"><span style="color:var(--muted);font-size:12px">إجمالي المرضى</span><strong>${totalPts||0}</strong></div>
        <div class="metric-row"><span style="color:var(--muted);font-size:12px">إجمالي الإيرادات</span><strong style="color:var(--success)">${fmt(income)}</strong></div>
        <div class="metric-row"><span style="color:var(--muted);font-size:12px">إجمالي المصاريف</span><strong style="color:var(--danger)">${fmt(expTotal)}</strong></div>
        <div class="metric-row"><span style="color:var(--muted);font-size:12px">صافي الكلي</span><strong style="color:${income-expTotal>=0?'var(--teal)':'var(--danger)'}">${fmt(income-expTotal)}</strong></div>
      </div>
    </div>`;
}

// ── Modal ─────────────────────────────────────────────
function modal(title,body){
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-ttl"><h3>${title}</h3><button class="btn btn-outline btn-sm" onclick="closeModal()">✕</button></div>
        ${body}
      </div>
    </div>`;
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

init();
</script>
</body>
</html>
